name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest git tag and strip 'v'
        id: get_tag
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0)
          STRIPPED_TAG=${LATEST_TAG#v}  # Remove leading 'v'
          echo "Latest tag (stripped): $STRIPPED_TAG"
          echo "stripped_tag=$STRIPPED_TAG" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        # this steps generates some metadata used in build-push-action later on
        uses: docker/metadata-action@v6
        with:
          # this spells the name of the image. 'ghcr.io/derivo-company' seems to be mandatory
          images: |
            ghcr.io/derivo-company/rdf-semspect
          # autogenerate tags from semantic versioning tag
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ steps.get_tag.outputs.stripped_tag }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./rdf-semspect
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
