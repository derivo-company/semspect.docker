name: Docker Scout for Latest

on:
  schedule:
    - cron: '0 8 * * 1'
      timezone: 'Europe/Berlin'
  workflow_dispatch:
  # run if docker-publish finished
  workflow_run:
    workflows: [ "Build and Push Docker Image" ]
    types:
      - completed

jobs:
  docker-scout:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    if: |
      github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest git tag and strip 'v'
        id: get_tag
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0)
          STRIPPED_TAG=${LATEST_TAG#v}  # Remove leading 'v'
          echo "Latest tag (stripped): $STRIPPED_TAG"
          echo "VERSION=${STRIPPED_TAG#v}" >> $GITHUB_ENV

      - name: Docker meta
        id: meta
        # this steps generates some metadata used in build-push-action later on
        uses: docker/metadata-action@v6
        with:
          # this spells the name of the image. 'ghcr.io/derivo-company' seems to be mandatory
          images: |
            ghcr.io/derivo-company/rdf-semspect
          tags: |
            type=raw,value=${{ env.VERSION }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Scout
        id: docker-scout
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ steps.meta.outputs.tags }}
          write-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }} # to be able to write the comment
          dockerhub-user: ${{ secrets.DOCKER_HUB_USER }}
          dockerhub-password: ${{secrets.DOCKER_HUB_PAT}}
          exit-code: true